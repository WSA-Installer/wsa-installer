name: Bug Report
description: Report a bug in WSA Installer
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the form below to help us identify and fix the issue.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of WSA Installer is affected?
      options:
        - Installation (WSA setup)
        - Play Store integration
        - Background Service
        - File Sharing (WebDAV)
        - Repair flow
        - Uninstall flow
        - Self-Update
        - UI / GUI
        - System Detection
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: WSA Installer Version
      description: "Find this in the About section or title bar"
      placeholder: "e.g., 1.2.0.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Windows Version
      description: "e.g., Windows 11 23H2, Windows 10 22H2"
      placeholder: "e.g., Windows 11 23H2"
    validations:
      required: true

  - type: input
    id: hardware
    attributes:
      label: Hardware Info (optional)
      description: "CPU, RAM, and any relevant hardware details"
      placeholder: "e.g., Intel i7-12700K, 16GB RAM"

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Open WSA Installer
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
      placeholder: Describe what you expected...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
      placeholder: Describe what actually happened...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: "Paste any relevant log output. Check `wsa_activity.log` for session logs."
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots (optional)
      description: If applicable, add screenshots to help explain the problem.

  - type: dropdown
    id: install-method
    attributes:
      label: Installation Method
      options:
        - NSIS Installer (WSA_Installer_Setup.exe)
        - Build from source (run.bat)
        - Portable (direct run)
    validations:
      required: true

  - type: dropdown
    id: playstore
    attributes:
      label: Play Store Installed?
      options:
        - "Yes"
        - "No"
        - Attempted but failed
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues to avoid duplicates
          required: true
        - label: I have checked the troubleshooting guide
          required: false
        - label: I have attached relevant log files
          required: false
